locastic_loggastic:
#    elastic_host: "%env(ACTIVITY_LOGS_ELASTIC_URL)%"
    loggable_paths:
        - '%kernel.project_dir%/Resources'
        - '%kernel.project_dir%/Model'

when@in_memory_storage:
    locastic_loggastic:
        storage: in_memory

when@doctrine_storage:
    locastic_loggastic:
        storage: doctrine
